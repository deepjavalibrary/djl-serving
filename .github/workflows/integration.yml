name: Integration tests

on:
  workflow_dispatch:
    inputs:
      djl-version:
        description: 'The released version of DJL'
        required: false
        default: ''
  schedule:
    - cron: '0 15 * * *'


jobs:
  tensorrt-llm-container-integ-tests:
    uses: ./.github/workflows/trtllm-container-integration.yml
    secrets: inherit
    with:
      djl-version: ${{ github.events.inputs.djl-version }}
  lmi-vllm-container-integ-tests:
    uses: ./.github/workflows/lmi-vllm-container-integration.yml
    secrets: inherit
    with:
      djl-version: ${{ github.events.inputs.djl-version }}
  cpu-container-integ-tests:
    uses: ./.github/workflows/cpu-container-integration.yml
    secrets: inherit
    with:
      djl-version: ${{ github.events.inputs.djl-version }}
  aarch64-container-integ-tests:
    uses: ./.github/workflows/aarch64-container-integration.yml
    secrets: inherit
    with:
      djl-version: ${{ github.events.inputs.djl-version }}
  pytorch-gpu-container-integ-tests:
    uses: ./.github/workflows/pytorch-gpu-container-integration.yml
    secrets: inherit
    with:
      djl-version: ${{ github.events.inputs.djl-version }}
  neuron-container-integ-tests:
    uses: ./.github/workflows/neuron-container-integration.yml
    secrets: inherit
    with:
      djl-version: ${{ github.events.inputs.djl-version }}
  publish-tensorrt-llm-container:
    runs-on: ubuntu-latest
    needs: tensorrt-llm-container-integ-tests
    if: always() && (needs.tensorrt-llm-container-integ-tests.result == 'success')
    steps:
      - name: Publish TRT Container
        run: echo "Would have published container here"
  publish-lmi-container:
    runs-on: ubuntu-latest
    needs: lmi-vllm-container-integ-tests
    if: always() && (needs.lmi-vllm-container-integ-tests.result == 'success')
    steps:
      - name: Publish LMI Container
        run: echo "Would have published container here"
  publish-cpu-container:
    runs-on: ubuntu-latest
    needs: cpu-container-integ-tests
    if: always() && (needs.cpu-container-integ-tests.result == 'success')
    steps:
      - name: Publish CPU Container
        run: echo "Would have published container here"
